# Equivalent mutants that cannot be killed by any test.
#
# Each exclusion targets a SPECIFIC mutation (by file:line:col) that produces
# identical observable output for ALL valid inputs. Only 22 mutations are
# excluded — all others are caught by tests or unviable.
#
# If production code changes shift line numbers, stale patterns will stop
# matching and the mutation will surface as MISSED, prompting an update.

exclude_re = [
    # ── Generated code ───────────────────────────────────────────────────
    "uniffi-bindgen\\.rs",

    # ── metrics.rs: DiveStats::compute — idempotent max/min tracking ─────
    # Setting max/min = value when they're already equal is a no-op.
    "src/metrics\\.rs:135:.*replace > with >= in DiveStats::compute",   # max_depth_m
    "src/metrics\\.rs:191:.*replace < with <= in DiveStats::compute",   # min_temp_c
    "src/metrics\\.rs:194:.*replace > with >= in DiveStats::compute",   # max_temp_c
    "src/metrics\\.rs:214:.*replace > with >= in DiveStats::compute",   # max_ceiling_m
    "src/metrics\\.rs:221:.*replace > with >= in DiveStats::compute",   # max_gf99
    "src/metrics\\.rs:228:.*replace > with >= in DiveStats::compute",   # max_tts_sec
    # weight_sum > 0.0: weight_sum is always strictly positive when samples exist
    "src/metrics\\.rs:253:.*replace > with >= in DiveStats::compute",
    # max_depth_m > 0.0: has_deco && max_depth_m == 0.0 is physically impossible
    # (no deco obligation at zero depth); >= produces equivalent result
    "src/metrics\\.rs:146:60:.*replace > with >= in DiveStats::compute",
    # has_deco && max_depth_m > 0.0: replacing && with || would also compute
    # bottom_end_t for non-deco dives, but bottom_time_sec guards on has_deco
    # separately, so the result is equivalent
    "src/metrics\\.rs:146:45:.*replace && with \\|\\| in DiveStats::compute",

    # ── metrics.rs: DiveStats::compute_rates — boundary guards ───────────
    # dt_min > 0.0 guards: dt_min=0 only when timestamps are duplicated,
    # which never occurs in real dive profiles. Either way, rate=0.
    "src/metrics\\.rs:348:.*replace > with >= in DiveStats::compute_rates",  # descent dt_min outer
    "src/metrics\\.rs:350:.*replace > with >= in DiveStats::compute_rates",  # descent dt_min inner
    "src/metrics\\.rs:363:.*replace > with >= in DiveStats::compute_rates",  # ascent dt_min
    # last_max_idx < samples.len()-1: boundary and len-1 arithmetic
    "src/metrics\\.rs:360:43:.*replace < with <= in DiveStats::compute_rates",
    "src/metrics\\.rs:360:59:.*replace - with \\+ in DiveStats::compute_rates",
    "src/metrics\\.rs:360:59:.*replace - with / in DiveStats::compute_rates",

    # ── metrics.rs: SegmentStats::compute — idempotent max/min tracking ──
    "src/metrics\\.rs:440:.*replace > with >= in SegmentStats::compute",   # max_depth_m
    "src/metrics\\.rs:445:.*replace < with <= in SegmentStats::compute",   # min_temp_c
    "src/metrics\\.rs:448:.*replace > with >= in SegmentStats::compute",   # max_temp_c
    "src/metrics\\.rs:469:.*replace > with >= in SegmentStats::compute",   # max_tts_sec

    # ── buhlmann.rs — FP threshold guards ────────────────────────────────
    # Leading compartment tie-break: exact FP equality across 16 compartments'
    # weighted N2+He GF values never occurs in practice
    "src/buhlmann\\.rs:153:.*replace > with >= in TissueState::surface_gf_and_leading",
    # denom > 1e-10: Bühlmann constants always give denom >> 1e-10
    "src/buhlmann\\.rs:180:.*replace > with >= in TissueState::compartment_gf",
    # dil_inert > 1e-10: gas fractions from real mixes never produce exactly 1e-10
    "src/buhlmann\\.rs:254:.*replace > with >= in compute_surface_gf",
]
