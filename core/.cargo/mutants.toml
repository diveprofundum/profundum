    "src/metrics\\.rs:151:22:.*replace < with .* in compute_bottom_end_t",
    "src/metrics\\.rs:151:26:.*replace \\|\\| with && in compute_bottom_end_t",
    # While-loop backward walk: ±1 sample in 120s window doesn't change rate
