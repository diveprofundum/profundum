name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────
  # Detect which components changed to skip unnecessary jobs
  # ─────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      swift: ${{ steps.filter.outputs.swift }}
      app: ${{ steps.filter.outputs.app }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'core/**'
              - 'Cargo.toml'
              - 'VERSION'
            swift:
              - 'apple/**'
              - 'VERSION'
            app:
              - 'Profundum/**'
            ci:
              - '.github/workflows/**'
              - 'Makefile'
              - 'scripts/**'

  # ─────────────────────────────────────────────────────────
  # Rust: lint + test (Linux, fast)
  # ─────────────────────────────────────────────────────────
  rust-lint:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core -> target

      - name: Check formatting
        run: cargo fmt --check
        working-directory: core

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: core

  rust-test:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core -> target

      - name: Run tests
        run: cargo test
        working-directory: core

  # ─────────────────────────────────────────────────────────
  # Swift: lint (Ubuntu — SwiftLint doesn't need Xcode)
  # ─────────────────────────────────────────────────────────
  swift-lint:
    needs: changes
    if: |
      needs.changes.outputs.swift == 'true' ||
      needs.changes.outputs.app == 'true' ||
      needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: |
          SWIFTLINT_VERSION=0.57.0
          curl -sL "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/swiftlint_linux.zip" -o swiftlint.zip
          unzip -q swiftlint.zip swiftlint
          chmod +x swiftlint
          sudo mv swiftlint /usr/local/bin/

      - name: Run SwiftLint
        run: swiftlint lint --strict --config .swiftlint.yml

  # ─────────────────────────────────────────────────────────
  # Swift: build + test + coverage (macOS, single job)
  # Builds XCFramework once for both tests and coverage,
  # eliminating a redundant ~4min xcframework rebuild.
  # ─────────────────────────────────────────────────────────
  swift-test:
    needs: [changes, rust-test]
    if: |
      always() &&
      (needs.rust-test.result == 'success' || needs.rust-test.result == 'skipped') &&
      (
        needs.changes.outputs.rust == 'true' ||
        needs.changes.outputs.swift == 'true' ||
        needs.changes.outputs.app == 'true' ||
        needs.changes.outputs.ci == 'true'
      )
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
          targets: aarch64-apple-darwin,x86_64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - uses: taiki-e/install-action@cargo-llvm-cov

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core -> target

      - name: Cache Swift SPM
        uses: actions/cache@v4
        with:
          path: apple/DivelogCore/.build
          key: spm-${{ runner.os }}-${{ hashFiles('apple/DivelogCore/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Build XCFramework (includes UniFFI binding generation)
        run: make xcframework

      - name: Run Swift tests
        run: cd apple/DivelogCore && swift test

      - name: Rust coverage
        run: make rust-coverage

      - name: Swift coverage
        run: make swift-coverage

      - name: Upload Rust coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/rust-lcov.info
          flags: rust
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Swift coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/swift-lcov.info
          flags: swift
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────────────────
  # Security: dependency audit + license/advisory compliance
  # ─────────────────────────────────────────────────────────
  security:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Generate Cargo.lock
        run: cargo generate-lockfile
        working-directory: core

      - name: Check for known vulnerabilities
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: core

      - name: Check licenses, advisories, and bans
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: core/Cargo.toml

  # ─────────────────────────────────────────────────────────
  # Version check: ensure VERSION file, Cargo.toml, and
  # Xcode project are in sync.
  # ─────────────────────────────────────────────────────────
  version-check:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.swift == 'true' || needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version consistency
        run: make version-check
